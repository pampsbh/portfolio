      - generic [ref=e345]: 07 — Impact
      - heading "Consistency that compounds." [level=2] [ref=e346]
      - paragraph [ref=e347]: Since Estrada shipped, PJUS products share the same visual language for the first time. Design decisions made once — a button style, a status color, a spacing rhythm — now apply everywhere automatically. The token pipeline syncs with Figma, so designers work from the same source of truth as developers.
      - paragraph [ref=e348]: Chromatic runs on every PR, catching visual regressions before they reach users. The team ships faster because the foundation is solved.
      - list [ref=e349]:
        - listitem [ref=e350]: Unified visual language across all PJUS products
        - listitem [ref=e352]: "Framework-agnostic: consumed by React, Angular, and plain HTML apps"
        - listitem [ref=e354]: Visual regression testing on every PR via Chromatic
        - listitem [ref=e356]: Figma-to-code token sync — one source of truth for design and dev
