    - generic [ref=e9]: Design System
    - heading "Estrada Design System" [level=1] [ref=e10]
    - paragraph [ref=e11]: A token-first design system built to unify every PJUS product — without locking teams into a single framework.
    - paragraph [ref=e12]: PJUS Investimentos · 2024-2025
  - main [ref=e14]:
    - generic [ref=e15]:
      - generic [ref=e17]: 01 — The Challenge
      - heading "Multiple products. No shared language." [level=2] [ref=e18]
      - paragraph [ref=e19]: "PJUS operates across several internal products — each built by different teams, at different speeds. Without a shared visual foundation, every interface diverged. Buttons looked different across screens. Spacing was arbitrary. Color carried no consistent meaning. As the product suite grew, so did the cost of inconsistency: more design decisions to repeat, more developer time spent on basics, more user confusion at handoff points."
      - paragraph [ref=e20]: The challenge was architectural. Any solution had to work across every stack the company might use — React, Angular, plain HTML — without forcing a migration. It had to be maintainable by a small team. And it had to scale as the product grew.
    - generic [ref=e21]:
      - generic [ref=e23]: 02 — Approach
      - heading "One source of truth. Zero framework lock-in." [level=2] [ref=e24]
      - paragraph [ref=e25]: "We built Estrada around a single principle: decisions made once should propagate everywhere automatically. That meant starting with design tokens — not components. Every color, size, and spacing value lives in JSON, processed by Style Dictionary into CSS custom properties. Change a token, and every component updates."
      - paragraph [ref=e26]: For components, we chose Web Components with Lit 3. Not because it was trendy — because it was the only option that let any PJUS team consume the system without adopting a new framework. Shadow DOM encapsulation meant styles could not leak. HTML attributes as props meant any codebase could drive the components without a build step.
