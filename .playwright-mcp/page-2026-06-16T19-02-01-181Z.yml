      - generic [ref=e336]: 07 — Impact
      - heading "Consistency that compounds." [level=2] [ref=e337]
      - paragraph [ref=e338]: Since Estrada shipped, PJUS products share the same visual language for the first time. Design decisions made once — a button style, a status color, a spacing rhythm — now apply everywhere automatically. The token pipeline syncs with Figma, so designers work from the same source of truth as developers.
      - paragraph [ref=e339]: Chromatic runs on every PR, catching visual regressions before they reach users. The team ships faster because the foundation is solved.
      - list [ref=e340]:
        - listitem [ref=e341]: Unified visual language across all PJUS products
        - listitem [ref=e343]: "Framework-agnostic: consumed by React, Angular, and plain HTML apps"
        - listitem [ref=e345]: Visual regression testing on every PR via Chromatic
        - listitem [ref=e347]: Figma-to-code token sync — one source of truth for design and dev
